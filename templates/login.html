<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AgriScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #00ff88;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854") no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        .nav-btn {
    background: #00ff88;   /* green box */
    color: black;          /* black text */
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}
        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: 550px;
            display: flex;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            width: 50%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #1e293b;
        }

        .form-section h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #0f172a;
        }

        .form-section p {
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }

        .btn-submit {
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-submit:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }
.btn-login {
            padding: 10px 25px;
            border: 1px solid rgba(0, 255, 136, 0.6);
            background: rgba(0, 255, 136, 0.12);
            color: var(--primary);
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: rgba(0, 255, 136, 0.25);
            color: var(--bg-dark);
        }

        .btn-login:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.35);
        }
        .stat-item {
    text-align: center;
    padding: 20px;
}

        /* Right Image Section */
.image-section{
    width:50%;
    background:linear-gradient(135deg,#28a745,#0077b6);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.image-section::before{
    content:"";
    position:absolute;
    width:200px;
    height:200px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    top:20%;
    left:20%;
    animation:moveLight 6s infinite alternate ease-in-out;
}

@keyframes moveLight{
    from{transform:translate(0,0);}
    to{transform:translate(60px,40px);}
}

.image-section img{
    width:80%;
    animation:float 4s ease-in-out infinite,
            zoomIn 6s ease-in-out infinite;
    filter:drop-shadow(0 0 20px rgba(255,255,255,0.4));
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

@keyframes zoomIn{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}


        @media(max-width: 900px) {
            .container {
                flex-direction: column;
                height: auto;
                max-width: 500px;
            }

            .form-section,
            .image-section {
                width: 100%;
            }

            .image-section {
                order: -1;
                padding: 40px;
            }

            .form-section {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="logo">Agri<span>Scan</span></a>
        <div class="nav-links">
            <a style="margin-top: 15px;" href="{{ url_for('index') }}" class="btn-login"
                style="background: var(--primary); color: var(--bg-dark);">Home</a>
            <a style="margin-top: 15px;"  href="{{ url_for('about') }}" class="btn-login"
                style="background: var(--primary); color: var(--bg-dark);">About</a>
            <a  style="margin-top: 15px;" href="{{ url_for('register') }}" class="btn-login"
                style="background: var(--primary); color: var(--bg-dark);">Register</a>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="container">
            <div class="form-section">
                <h2>Welcome Back</h2>
                <p>Enter your details to access your account.</p>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="new-password">
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>

                    <button type="submit" class="btn-submit">
                        Sign In
                    </button>

                    <p style="margin-top: 25px; font-size: 0.9rem; text-align: center;">
                        New to AgriScan? <a href="{{ url_for('register') }}"
                            style="color: #00b8ff; font-weight: 600; text-decoration: none;">Create an account</a>
                    </p>
                </form>
            </div>

            <div class="image-section">
        <img src="https://onlinegiftools.com/images/gif/illustrations/crop-gif.png" alt="Crop Illustration">
    </div>
        </div>
    </div>

    <script>
        document.getElementById("togglePassword").addEventListener("click", function () {
            let input = document.getElementById("password");
            if (input.type === "password") {
                input.type = "text";
                this.classList.remove("fa-eye");
                this.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                this.classList.remove("fa-eye-slash");
                this.classList.add("fa-eye");
            }
        });
    </script>
    

</body>

</html>
