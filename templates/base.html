<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgriScan AI{% endblock %}</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        /* ================= ROOT VARIABLES ================= */
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --primary: #00ff88;
            --primary-dim: #00cc6a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gradient: linear-gradient(135deg, #00ff88 0%, #00b8ff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn {
            padding: 10px 25px;
            border: 1px solid rgba(0, 255, 136, 0.6);
            background: rgba(0, 255, 136, 0.12);
            color: var(--primary);
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(0, 255, 136, 0.25);
            color: var(--bg-dark);
        }

        .btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.35);
        }

        /* Page helpers */
        .content-wrapper {
            padding-top: 120px;
            /* give space for fixed nav */
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 60px;
        }

        @media(max-width: 900px) {
            .content-wrapper {
                padding-top: 100px;
            }
        }

            {
            % block extra_styles %
        }

            {
            % endblock %
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">Agri<span>Scan</span></div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="btn">Home</a>
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('upload') }}" class="btn">Scan now</a>
            <a href="{{ url_for('logout') }}" class="btn">Logout</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="btn">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}

</body>

</html>
