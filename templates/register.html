<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AgriScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #00ff88;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854") no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .register-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: 650px;
            display: flex;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            width: 50%;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #1e293b;
        }

        .form-section h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #0f172a;
        }

        .form-section p {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            outline: none;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }

        .btn-submit {
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        .image-section {
            width: 50%;
            background: linear-gradient(135deg, #00ff88, #00b8ff);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .image-section img {
            width: 90%;
            max-width: 450px;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.2));
        }

        @media(max-width: 900px) {
            .container {
                flex-direction: column;
                height: auto;
                max-width: 500px;
            }

            .form-section,
            .image-section {
                width: 100%;
            }

            .image-section {
                order: -1;
                padding: 40px;
            }

            .form-section {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="logo">Agri<span>Scan</span></a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('login') }}" style="color: var(--primary);">Login</a>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="container">
            <div class="form-section">
                <h2>Create Account</h2>
                <p>Join our community and protect your crops with AI.</p>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="input-group">
                        <input type="text" name="name" placeholder="Full Name" required>
                    </div>

                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                    </div>

                    <button type="submit" class="btn-submit">
                        Sign Up
                    </button>

                    <p style="margin-top: 20px; font-size: 0.9rem; text-align: center;">
                        Already have an account? <a href="{{ url_for('login') }}"
                            style="color: #00b8ff; font-weight: 600; text-decoration: none;">Sign in here</a>
                    </p>
                </form>
            </div>

            <div class="image-section">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/agricultural-scientist-doing-research-on-plants-illustration-download-in-svg-png-gif-file-formats--growth-farming-science-experiment-field-pack-nature-illustrations-5310652.png"
                    alt="Register Illustration">
            </div>
        </div>
    </div>

    <script>
        document.getElementById("togglePassword").addEventListener("click", function () {
            let input = document.getElementById("password");
            if (input.type === "password") {
                input.type = "text";
                this.classList.remove("fa-eye");
                this.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                this.classList.remove("fa-eye-slash");
                this.classList.add("fa-eye");
            }
        });
    </script>

</body>

</html>
